<div class="app-container">
  <nav class="app-nav">
    <div class="nav-content">
      <h1 class="app-title">ポケモン TGC</h1>
      <div class="nav-links">
        <button
          class="nav-link"
          [class.active]="currentView === 'game'"
          (click)="switchView('game')"
        >
          ゲーム
        </button>
        <button
          class="nav-link"
          [class.active]="currentView === 'creator'"
          (click)="switchView('creator')"
        >
          カード作成
        </button>
        <button
          class="nav-link"
          [class.active]="currentView === 'deck'"
          (click)="switchView('deck')"
        >
          デッキ作成
        </button>
        <button
          class="nav-link"
          [class.active]="currentView === 'cards'"
          (click)="switchView('cards')"
        >
          カード一覧
        </button>
      </div>
    </div>
  </nav>

  <main class="app-main">
    @if (currentView === 'game') {
      <game-board></game-board>
    }
    @if (currentView === 'creator') {
      <card-creator></card-creator>
    }
    @if (currentView === 'deck') {
      <deck-builder></deck-builder>
    }
    @if (currentView === 'cards') {
      <card-viewer></card-viewer>
    }
  </main>
</div>
