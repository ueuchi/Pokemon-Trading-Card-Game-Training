services:
  - type: web
    name: pokemon-card-api
    runtime: python
    plan: free
    buildCommand: cd pokeca/backend && pip install -r requirements.txt && python database/setup.py
    startCommand: cd pokeca/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
